<!doctype html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  {{ with .Site.Params.description }}<meta name="description" content="{{ . }}">{{ end }}
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; color: #222; }
    a { color: #0366d6; }
    header nav a { margin-right: 1rem; }
    article header h1 { margin-bottom: 0.25rem; }
    .meta { color: #666; font-size: 0.9rem; }
    ul.posts { list-style: none; padding: 0; }
    ul.posts li { margin: 0.75rem 0; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
      <a href="{{ "/posts/" | relURL }}">Posts</a>
    </nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    <hr>
    <p class="meta">Built with Hugo · Edited with Decap CMS</p>
  </footer>
</body>
</html>
