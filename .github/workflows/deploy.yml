name: Build and Deploy Hugo site

on:
  push:
    branches: [main]
  # Build PRs too so editors get a status check before merging.
  pull_request:
    branches: [main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel an in-flight run if a newer commit lands on the same ref.
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.135.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive   # for Hugo themes added as submodules
          fetch-depth: 0          # needed for .GitInfo / .Lastmod

      - name: Install Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Cache Hugo resources
        uses: actions/cache@v4
        with:
          path: |
            resources
            .hugo_build.lock
          key: hugo-${{ runner.os }}-${{ hashFiles('hugo.toml') }}-${{ github.sha }}
          restore-keys: |
            hugo-${{ runner.os }}-${{ hashFiles('hugo.toml') }}-

      - name: Build site
        run: hugo --minify --gc --baseURL "${{ steps.pages.outputs.base_url || 'https://kidclone3.github.io/decap-hugo-demo/' }}"

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
